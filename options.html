<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectAI — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo">
        <div class="logo-mark">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#0A66C2"/>
            <path d="M8 14C8 10.686 10.686 8 14 8C17.314 8 20 10.686 20 14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <path d="M14 20V14" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
            <circle cx="14" cy="14" r="2" fill="white"/>
          </svg>
        </div>
        <div>
          <h1 class="logo-title">ConnectAI</h1>
          <p class="logo-sub">Settings</p>
        </div>
      </div>
    </header>

    <main class="main">
      <form id="settings-form" autocomplete="off">

        <section class="section">
          <h2 class="section-title">
            <span class="section-icon">👤</span>
            Your Profile
          </h2>
          <p class="section-desc">This info will be used to personalize your outreach messages.</p>

          <div class="field-group">
            <div class="field">
              <label for="sender-name">Full Name</label>
              <input type="text" id="sender-name" placeholder="e.g. Alex Johnson" />
            </div>
            <div class="field">
              <label for="sender-role">Your Current Role</label>
              <input type="text" id="sender-role" placeholder="e.g. 3rd Year CS Student at MIT" />
            </div>
            <div class="field">
              <label for="sender-college">College / Company</label>
              <input type="text" id="sender-college" placeholder="e.g. MIT / Google" />
            </div>
          </div>
        </section>

        <section class="section">
          <h2 class="section-title">
            <span class="section-icon">🔑</span>
            Anthropic API Key
          </h2>
          <p class="section-desc">
            Your key is stored locally and never leaves your browser except to call the Anthropic API.
            <a href="https://console.anthropic.com/account/keys" target="_blank" class="link">Get your key →</a>
          </p>

          <div class="field-group">
            <div class="field">
              <label for="api-key">API Key</label>
              <div class="input-wrapper">
                <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off" />
                <button type="button" id="toggle-key" class="toggle-btn" title="Show/hide key">
                  <svg id="eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                  <svg id="eye-closed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                    <line x1="1" y1="1" x2="23" y2="23"/>
                  </svg>
                </button>
              </div>
              <p class="field-hint">Format: <code>sk-ant-api03-...</code></p>
            </div>
          </div>

          <div id="key-validation" class="key-validation" style="display:none">
            <span id="key-validation-icon"></span>
            <span id="key-validation-msg"></span>
          </div>
        </section>

        <div class="actions">
          <button type="submit" id="save-btn" class="save-btn">
            <span id="save-text">Save Settings</span>
            <span id="save-spinner" class="spinner" style="display:none"></span>
          </button>
        </div>
      </form>

      <!-- USAGE STATS -->
      <section class="section stats-section">
        <h2 class="section-title">
          <span class="section-icon">📊</span>
          Usage Stats
        </h2>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="stat-generations">0</div>
            <div class="stat-label">Generations</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="stat-saved">0</div>
            <div class="stat-label">Saved Messages</div>
          </div>
        </div>
      </section>
    </main>

    <div id="toast" class="toast" role="alert" aria-live="polite"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
